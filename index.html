var map = L.map('map', { center: [49.0, 32.0], zoom: 6 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

function makeIcon(type) {
  var color = type === 'book' ? '#2563EB' : '#F59E0B';
  var sz = type === 'book' ? 10 : 8;
  return L.divIcon({
    className: '',
    html: '<div style="width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;background:' + color + ';border:1.5px solid rgba(255,255,255,.4);box-shadow:0 0 5px ' + color + '80"></div>',
    iconSize: [sz, sz], iconAnchor: [sz/2, sz/2]
  });
}

var currentLayer = null;

function render(filterType) {
  if (currentLayer) map.removeLayer(currentLayer);

  var cluster = L.markerClusterGroup({
    maxClusterRadius: 45, showCoverageOnHover: false, spiderfyOnMaxZoom: true,
    iconCreateFunction: function(cl) {
      var n = cl.getChildCount();
      var hasBook=false, hasCafe=false;
      cl.getAllChildMarkers().forEach(function(m){ if(m.options.mtype==='book') hasBook=true; else hasCafe=true; });
      var color = (hasBook && hasCafe) ? '#8B5CF6' : (hasBook ? '#2563EB' : '#F59E0B');
      var size = n < 10 ? 30 : n < 100 ? 38 : 46;
      return L.divIcon({
        html: '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,.25)">' + n + '</div>',
        className: '', iconSize: [size, size]
      });
    }
  });

  var books=0, cafes=0;
  for (var i=0; i<ALL_DATA.length; i++) {
    var p = ALL_DATA[i];
    if (filterType !== 'all' && p.type !== filterType) continue;
    if (p.type === 'book') books++; else cafes++;
    var m = L.marker([p.la, p.lo], { icon: makeIcon(p.type), mtype: p.type });
    var gmapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + p.la + ',' + p.lo + '&query_place_id=' + p.p;
    m.bindPopup(
      '<div class="popup-title">' + p.t + '</div>' +
      '<div class="popup-cat" style="color:' + (p.type==='book' ? '#60a5fa' : '#F59E0B') + '">' + p.c + '</div>' +
      (p.a ? '<div class="popup-addr">' + p.a + '</div>' : '<div class="popup-addr"></div>') +
      '<a class="popup-link" href="' + gmapsUrl + '" target="_blank" rel="noopener">Відкрити в Google Maps →</a>'
    );
    cluster.addLayer(m);
  }

  document.getElementById('s-book').textContent = books.toLocaleString('uk');
  document.getElementById('s-cafe').textContent = cafes.toLocaleString('uk');
  document.getElementById('count-label').textContent = (books+cafes).toLocaleString('uk') + ' точок на карті';
  if (books > 0 && cafes > 0) {
    document.getElementById('ratio').textContent = 'На 1 книгарню — ' + (cafes/books).toFixed(1) + ' кав\'ярень';
  } else {
    document.getElementById('ratio').textContent = '';
  }

  currentLayer = cluster;
  map.addLayer(cluster);
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.className = 'filter-btn'; });
    var t = btn.dataset.type;
    btn.className = 'filter-btn active-' + t;
    render(t);
  });
});

render('all');
</script>
